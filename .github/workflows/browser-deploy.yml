name: Deploy Browser Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.prod \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/neonbinder-browser:latest \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/neonbinder-browser:${{ github.sha }} \
            .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/neonbinder-browser --all-tags

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neonbinder-browser
          region: us-central1
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/neonbinder-browser:${{ github.sha }}
