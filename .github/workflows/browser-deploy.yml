name: Deploy Browser Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # PRs: group per-PR and cancel in-flight so rapid pushes don't stack up
  # redundant preview builds. Pushes: group per-ref without cancel so back-
  # to-back merges serialize cleanly through dev → prod.
  group: browser-deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Unit tests + build run on both push and pull_request so a PR surfaces
  # any breakage before merge. All deploy/gate jobs below are gated on
  # `github.event_name == 'push'` — they need an actual ref to deploy, and
  # we never want a PR to push a Cloud Run revision.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm run build
      - run: npm test

  # ---------------------------------------------------------------------------
  # PR preview path (PRs targeting main, from branches in this repo).
  #
  # Each PR gets a stable `pr-<N>` tagged revision on the dev Cloud Run
  # service. Smoke + login-probe run against the same preview URL that a
  # human QA's against. Traffic-serving dev (main's HEAD) is untouched.
  # Fork PRs are skipped because they can't access WIF/OIDC secrets.
  #
  # Teardown lives in `preview-cleanup.yml` on `pull_request: closed`.
  # ---------------------------------------------------------------------------
  deploy-preview:
    needs: test
    if: |
      github.event_name == 'pull_request'
      && github.base_ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      preview_url: ${{ steps.capture.outputs.preview_url }}
      preview_tag: ${{ steps.capture.outputs.preview_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        env:
          IMAGE: gcr.io/neonbinder-dev/neonbinder-browser
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # `:pr-<N>` is the stable tag referenced by the Cloud Run deploy.
          # `:<head-sha>` is here for Phase 3 artifact promotion: the merge-
          # to-main workflow will look up this exact image by SHA and
          # re-tag/push it to the prod GCR without rebuilding.
          docker build -f Dockerfile.prod \
            -t "$IMAGE:pr-$PR_NUMBER" \
            -t "$IMAGE:$HEAD_SHA" \
            .
          docker push "$IMAGE:pr-$PR_NUMBER"
          docker push "$IMAGE:$HEAD_SHA"

      - name: Deploy tagged no-traffic preview to dev Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neonbinder-browser
          region: us-central1
          image: gcr.io/neonbinder-dev/neonbinder-browser:pr-${{ github.event.pull_request.number }}
          project_id: neonbinder-dev
          env_vars: ENVIRONMENT=dev
          no_traffic: true
          tag: pr-${{ github.event.pull_request.number }}

      - id: capture
        name: Capture preview URL
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          TAG="pr-$PR"
          TAGGED_URL=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder-dev \
            --format=json \
            | jq -r ".status.traffic[] | select(.tag == \"$TAG\") | .url")
          if [ -z "$TAGGED_URL" ] || [ "$TAGGED_URL" = "null" ]; then
            echo "ERROR: preview URL for tag=$TAG not found on service."
            exit 1
          fi
          echo "preview_url=$TAGGED_URL" >> $GITHUB_OUTPUT
          echo "preview_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Preview URL: $TAGGED_URL"

  preview-smoke:
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch internal API key (dev)
        run: |
          echo "SMOKE_TEST_API_KEY=$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder-dev)" >> $GITHUB_ENV

      - name: Run smoke tests against preview
        env:
          SMOKE_TEST_URL: ${{ needs.deploy-preview.outputs.preview_url }}
        run: node --test tests/smoke.test.mjs

  preview-login-probe:
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch internal API key (dev)
        run: |
          echo "INTERNAL_API_KEY=$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder-dev)" >> $GITHUB_ENV

      - name: Run integration suite against preview
        env:
          TARGET_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          BSC_USERNAME: ${{ secrets.MAESTRO_BSC_USERNAME }}
          BSC_PASSWORD: ${{ secrets.MAESTRO_BSC_PASSWORD }}
          SPORTLOTS_USERNAME: ${{ secrets.MAESTRO_SPORTLOTS_USERNAME }}
          SPORTLOTS_PASSWORD: ${{ secrets.MAESTRO_SPORTLOTS_PASSWORD }}
        run: npm run test:prod-gate

  # Sticky PR comment with preview URL + check results. Runs regardless of
  # whether deploy/smoke/probe succeeded so a failure still leaves a trace
  # on the PR pointing at the workflow run.
  comment-preview:
    needs: [deploy-preview, preview-smoke, preview-login-probe]
    if: |
      always()
      && github.event_name == 'pull_request'
      && github.base_ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Sticky preview comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          URL: ${{ needs.deploy-preview.outputs.preview_url }}
          TAG: ${{ needs.deploy-preview.outputs.preview_tag }}
          DEPLOY_RESULT: ${{ needs.deploy-preview.result }}
          SMOKE_RESULT: ${{ needs.preview-smoke.result }}
          PROBE_RESULT: ${{ needs.preview-login-probe.result }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          status() {
            case "$1" in
              success) echo "PASS" ;;
              failure) echo "FAIL" ;;
              cancelled) echo "CANCELLED" ;;
              skipped) echo "skipped" ;;
              *) echo "$1" ;;
            esac
          }

          URL_LINE="not deployed — see workflow run"
          if [ "$DEPLOY_RESULT" = "success" ] && [ -n "$URL" ]; then
            URL_LINE="$URL"
          fi

          cat > body.md <<EOF
          <!-- neonbinder-browser-preview-marker -->
          ## Browser service preview

          **URL:** $URL_LINE
          **Tag:** \`$TAG\`

          **Checks**
          - Deploy: $(status "$DEPLOY_RESULT")
          - Smoke: $(status "$SMOKE_RESULT")
          - Login probe: $(status "$PROBE_RESULT")

          Preview auto-updates on each push to this PR and is torn down when the PR closes. [Workflow run]($RUN_URL)
          EOF

          # Find existing sticky comment by HTML marker, or create a new one.
          EXISTING=$(gh api "repos/$REPO/issues/$PR/comments" \
            --paginate \
            --jq '.[] | select(.body | contains("neonbinder-browser-preview-marker")) | .id' \
            | head -n 1)

          if [ -n "$EXISTING" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$EXISTING" -f body="$(cat body.md)" > /dev/null
            echo "Updated sticky comment $EXISTING."
          else
            gh api --method POST "repos/$REPO/issues/$PR/comments" -f body="$(cat body.md)" > /dev/null
            echo "Created sticky comment."
          fi

  # ---------------------------------------------------------------------------
  # Push-to-main unified flow (Phase 3 of trunk-based migration).
  #
  #   test → build-push → deploy-dev → dev-smoke → convex-dev-gate
  #                                                     │
  #                             ┌───────────────────────┴─────────┐
  #                         (success)                         (failure)
  #                             │                                 │
  #                        deploy-prod                       dev-rollback
  #                             │
  #                        prod-smoke + prod-login-probe
  #                             │
  #                        prod-promote
  #
  # Build happens ONCE; the same image SHA tag flows from dev → prod. Dev
  # gets immediate 100% traffic so the convex Maestro gate can exercise
  # main's HEAD. Prod uses blue/green (no_traffic + sha tag) so a failed
  # probe leaves prod serving the previous revision.
  # ---------------------------------------------------------------------------

  # Build once, push to both dev and prod GCRs. Downstream deploy jobs
  # reference the image by commit SHA so dev and prod serve identical bytes.
  # Two auth steps in one job let us pull/push to both projects without
  # granting cross-project AR permissions.
  build-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      short_sha: ${{ steps.short.outputs.short_sha }}
      deploy_tag: ${{ steps.short.outputs.deploy_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: short
        name: Compute sha tag
        run: |
          SHORT="$(echo "$GITHUB_SHA" | cut -c1-7)"
          echo "short_sha=$SHORT" >> $GITHUB_OUTPUT
          echo "deploy_tag=sha-$SHORT" >> $GITHUB_OUTPUT

      - name: Auth to dev
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR (dev)
        run: gcloud auth configure-docker --quiet

      - name: Build + push to dev GCR
        env:
          SHA: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.prod \
            -t gcr.io/neonbinder-dev/neonbinder-browser:$SHA \
            -t gcr.io/neonbinder-dev/neonbinder-browser:latest \
            .
          docker push gcr.io/neonbinder-dev/neonbinder-browser:$SHA
          docker push gcr.io/neonbinder-dev/neonbinder-browser:latest

      - name: Re-auth to prod
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}

      - name: Configure Docker for GCR (prod)
        run: gcloud auth configure-docker --quiet

      - name: Retag + push to prod GCR
        env:
          SHA: ${{ github.sha }}
        run: |
          # Same image bytes, new tags under the prod project path.
          docker tag gcr.io/neonbinder-dev/neonbinder-browser:$SHA gcr.io/neonbinder/neonbinder-browser:$SHA
          docker tag gcr.io/neonbinder-dev/neonbinder-browser:$SHA gcr.io/neonbinder/neonbinder-browser:latest
          docker push gcr.io/neonbinder/neonbinder-browser:$SHA
          docker push gcr.io/neonbinder/neonbinder-browser:latest

  # Dev deploy: immediate 100% traffic so the Maestro gate runs against the
  # service URL that dev Convex and the integration-test branch point at.
  deploy-dev:
    needs: build-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      prev_revision: ${{ steps.capture-prev.outputs.prev_revision }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: capture-prev
        name: Capture dev's currently-serving revision
        run: |
          PREV=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder-dev \
            --format='value(status.traffic[0].revisionName)')
          echo "Previous dev revision: $PREV"
          echo "prev_revision=$PREV" >> $GITHUB_OUTPUT

      - name: Deploy to dev Cloud Run (immediate traffic)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neonbinder-browser
          region: us-central1
          image: gcr.io/neonbinder-dev/neonbinder-browser:${{ github.sha }}
          project_id: neonbinder-dev
          env_vars: ENVIRONMENT=dev

  # Fast fail before the 20-minute Maestro gate: basic health/auth checks
  # against the fresh dev revision.
  dev-smoke:
    needs: deploy-dev
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve dev URL + fetch internal API key
        run: |
          echo "SMOKE_TEST_URL=$(gcloud run services describe neonbinder-browser --project=neonbinder-dev --region=us-central1 --format='value(status.url)')" >> $GITHUB_ENV
          echo "SMOKE_TEST_API_KEY=$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder-dev)" >> $GITHUB_ENV

      - name: Run smoke tests against dev
        run: node --test tests/smoke.test.mjs

  # Dispatch the neonbinder_convex E2E suite against integration-test, whose
  # Vercel preview talks to dev Convex and (transitively) dev Cloud Run.
  convex-dev-gate:
    needs: dev-smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      e2e_run_url: ${{ steps.dispatch.outputs.run_url }}

    steps:
      - id: dispatch
        name: Dispatch neonbinder_convex E2E on integration-test
        env:
          GH_TOKEN: ${{ secrets.CONVEX_E2E_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dispatching E2E on neonbinder_convex@integration-test..."
          gh workflow run e2e-tests.yml \
            --repo neonbinder/neonbinder_convex \
            --ref integration-test

          for attempt in $(seq 1 20); do
            RUN_ID=$(gh run list \
              --repo neonbinder/neonbinder_convex \
              --workflow=e2e-tests.yml \
              --branch integration-test \
              --limit 5 \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"$BEFORE\")] | sort_by(.createdAt) | .[0].databaseId // empty")
            if [ -n "$RUN_ID" ]; then break; fi
            echo "attempt $attempt/20: run not yet visible, waiting 3s"
            sleep 3
          done
          if [ -z "$RUN_ID" ]; then
            echo "Failed to locate dispatched run after 1 minute."
            exit 1
          fi

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "run_url=https://github.com/neonbinder/neonbinder_convex/actions/runs/$RUN_ID" >> $GITHUB_OUTPUT
          echo "Dispatched run: https://github.com/neonbinder/neonbinder_convex/actions/runs/$RUN_ID"

      - name: Wait for E2E completion
        env:
          GH_TOKEN: ${{ secrets.CONVEX_E2E_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID=${{ steps.dispatch.outputs.run_id }}
          for attempt in $(seq 1 90); do
            STATE=$(gh run view "$RUN_ID" \
              --repo neonbinder/neonbinder_convex \
              --json status,conclusion \
              --jq '"\(.status)|\(.conclusion)"')
            STATUS="${STATE%%|*}"
            CONCLUSION="${STATE##*|}"
            if [ "$STATUS" = "completed" ]; then
              echo "E2E completed with conclusion: $CONCLUSION"
              [ "$CONCLUSION" = "success" ] && exit 0 || exit 1
            fi
            echo "attempt $attempt/90: $STATUS — waiting 30s"
            sleep 30
          done
          echo "Timed out after 45 minutes waiting for E2E."
          exit 1

  # On gate failure, roll dev traffic back to the prior revision. Prod is
  # still-not-deployed so nothing to do there.
  dev-rollback:
    needs: [deploy-dev, convex-dev-gate]
    if: always() && github.event_name == 'push' && needs.convex-dev-gate.result == 'failure' && needs.deploy-dev.outputs.prev_revision != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Roll dev traffic back to ${{ needs.deploy-dev.outputs.prev_revision }}
        run: |
          set -euo pipefail
          PREV="${{ needs.deploy-dev.outputs.prev_revision }}"
          echo "Shifting 100% of traffic on neonbinder-browser (dev) back to $PREV"
          gcloud run services update-traffic neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder-dev \
            --to-revisions="$PREV=100"
          echo "Rollback complete. The broken revision stays in the revision"
          echo "list (inactive) so we can inspect it, but serves no traffic."

  # Prod deploy: blue/green — land the image from build-push at 0% traffic
  # under a sha tag; the gate jobs below exercise the tagged URL before
  # promote shifts traffic.
  deploy-prod:
    needs: [build-push, convex-dev-gate]
    if: github.event_name == 'push' && needs.convex-dev-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      new_revision: ${{ steps.capture-new.outputs.new_revision }}
      tagged_url: ${{ steps.capture-new.outputs.tagged_url }}
      prev_revision: ${{ steps.capture-prev.outputs.prev_revision }}

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: capture-prev
        name: Capture prod's currently-serving revision
        run: |
          PREV=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder \
            --format='value(status.traffic[0].revisionName)')
          echo "Previous prod revision: $PREV"
          echo "prev_revision=$PREV" >> $GITHUB_OUTPUT

      - name: Deploy to prod Cloud Run (no_traffic + sha tag)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neonbinder-browser
          region: us-central1
          image: gcr.io/neonbinder/neonbinder-browser:${{ github.sha }}
          project_id: neonbinder
          env_vars: ENVIRONMENT=prod
          no_traffic: true
          tag: ${{ needs.build-push.outputs.deploy_tag }}

      - id: capture-new
        name: Capture new prod revision + tagged URL
        env:
          TAG: ${{ needs.build-push.outputs.deploy_tag }}
        run: |
          set -euo pipefail
          NEW=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder \
            --format='value(status.latestCreatedRevisionName)')
          TAGGED_URL=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder \
            --format=json \
            | jq -r ".status.traffic[] | select(.tag == \"$TAG\") | .url")
          if [ -z "$TAGGED_URL" ] || [ "$TAGGED_URL" = "null" ]; then
            echo "ERROR: tagged URL for tag=$TAG not found on service."
            exit 1
          fi
          echo "new_revision=$NEW" >> $GITHUB_OUTPUT
          echo "tagged_url=$TAGGED_URL" >> $GITHUB_OUTPUT

  prod-smoke:
    needs: deploy-prod
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch internal API key (prod)
        run: |
          echo "SMOKE_TEST_API_KEY=$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder)" >> $GITHUB_ENV

      - name: Run smoke tests against prod tagged URL
        env:
          SMOKE_TEST_URL: ${{ needs.deploy-prod.outputs.tagged_url }}
        run: node --test tests/smoke.test.mjs

  # Real marketplace login round-trip against the prod tagged revision. This
  # is the signal the dev gate cannot produce: can prod's env + prod Secret
  # Manager + prod SA actually authenticate to BSC and SportLots?
  prod-login-probe:
    needs: deploy-prod
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch internal API key (prod)
        run: |
          echo "INTERNAL_API_KEY=$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder)" >> $GITHUB_ENV

      - name: Run prod-gate integration suite
        env:
          TARGET_URL: ${{ needs.deploy-prod.outputs.tagged_url }}
          BSC_USERNAME: ${{ secrets.MAESTRO_BSC_USERNAME }}
          BSC_PASSWORD: ${{ secrets.MAESTRO_BSC_PASSWORD }}
          SPORTLOTS_USERNAME: ${{ secrets.MAESTRO_SPORTLOTS_USERNAME }}
          SPORTLOTS_PASSWORD: ${{ secrets.MAESTRO_SPORTLOTS_PASSWORD }}
        run: npm run test:prod-gate

  # Shifts 100% prod traffic to the new sha-tagged revision. Any prior
  # failure skips this job and the previous revision continues to serve.
  prod-promote:
    needs: [deploy-prod, prod-smoke, prod-login-probe]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Promote ${{ needs.deploy-prod.outputs.new_revision }} to 100%
        run: |
          set -euo pipefail
          gcloud run services update-traffic neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder \
            --to-revisions="${{ needs.deploy-prod.outputs.new_revision }}=100"
          echo "Promotion complete. The sha-tag remains on the revision for later inspection."

  # Unified failure report: fires if any stage between build and promote
  # failed. Identifies the first failed stage so the issue title points at
  # the actionable step.
  report-failure:
    needs: [test, build-push, deploy-dev, dev-smoke, convex-dev-gate, dev-rollback, deploy-prod, prod-smoke, prod-login-probe, prod-promote]
    if: |
      always() && github.event_name == 'push' && (
        needs.test.result == 'failure' ||
        needs.build-push.result == 'failure' ||
        needs.deploy-dev.result == 'failure' ||
        needs.dev-smoke.result == 'failure' ||
        needs.convex-dev-gate.result == 'failure' ||
        needs.deploy-prod.result == 'failure' ||
        needs.prod-smoke.result == 'failure' ||
        needs.prod-login-probe.result == 'failure' ||
        needs.prod-promote.result == 'failure'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Open GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R_TEST: ${{ needs.test.result }}
          R_BUILD: ${{ needs.build-push.result }}
          R_DEV: ${{ needs.deploy-dev.result }}
          R_DEV_SMOKE: ${{ needs.dev-smoke.result }}
          R_GATE: ${{ needs.convex-dev-gate.result }}
          R_ROLLBACK: ${{ needs.dev-rollback.result }}
          R_PROD: ${{ needs.deploy-prod.result }}
          R_PROD_SMOKE: ${{ needs.prod-smoke.result }}
          R_PROBE: ${{ needs.prod-login-probe.result }}
          R_PROMOTE: ${{ needs.prod-promote.result }}
          GATE_URL: ${{ needs.convex-dev-gate.outputs.e2e_run_url }}
          NEW_REV: ${{ needs.deploy-prod.outputs.new_revision }}
          TAG: ${{ needs.build-push.outputs.deploy_tag }}
          TAGGED_URL: ${{ needs.deploy-prod.outputs.tagged_url }}
          PROD_PREV: ${{ needs.deploy-prod.outputs.prev_revision }}
          DEV_PREV: ${{ needs.deploy-dev.outputs.prev_revision }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # Stop at first failure so the issue title is the actionable stage.
          if [ "$R_TEST" = "failure" ]; then STAGE=test
          elif [ "$R_BUILD" = "failure" ]; then STAGE=build-push
          elif [ "$R_DEV" = "failure" ]; then STAGE=deploy-dev
          elif [ "$R_DEV_SMOKE" = "failure" ]; then STAGE=dev-smoke
          elif [ "$R_GATE" = "failure" ]; then STAGE=convex-dev-gate
          elif [ "$R_PROD" = "failure" ]; then STAGE=deploy-prod
          elif [ "$R_PROD_SMOKE" = "failure" ]; then STAGE=prod-smoke
          elif [ "$R_PROBE" = "failure" ]; then STAGE=prod-login-probe
          elif [ "$R_PROMOTE" = "failure" ]; then STAGE=prod-promote
          else STAGE=unknown
          fi

          # Separate blast radius description per failure class.
          case "$STAGE" in
            test|build-push)
              BLAST="No infra touched. Dev and prod both still serving their previous revisions." ;;
            deploy-dev|dev-smoke|convex-dev-gate)
              BLAST="Dev was redeployed and then rolled back (if dev-rollback ran successfully). Prod never touched. Dev previous revision: \`$DEV_PREV\`, rollback job result: \`$R_ROLLBACK\`." ;;
            deploy-prod|prod-smoke|prod-login-probe)
              BLAST="Dev is serving main's HEAD. Prod has a parked revision at 0% traffic (\`$NEW_REV\`, tag \`$TAG\`) and is still serving \`$PROD_PREV\`. Tagged URL for local poking: $TAGGED_URL." ;;
            prod-promote)
              BLAST="Dev is serving main's HEAD. Prod blue/green gate passed but the traffic shift call itself failed. Re-run the promote job manually or investigate update-traffic errors." ;;
            *)
              BLAST="Unknown failure mode — check the run directly." ;;
          esac

          cat > body.md <<EOF
          Deploy workflow failed at **\`$STAGE\`** for commit ${{ github.sha }}.

          **Blast radius:** $BLAST

          **Stage results**
          | Stage | Result |
          |---|---|
          | test | \`$R_TEST\` |
          | build-push | \`$R_BUILD\` |
          | deploy-dev | \`$R_DEV\` |
          | dev-smoke | \`$R_DEV_SMOKE\` |
          | convex-dev-gate | \`$R_GATE\` |
          | dev-rollback | \`$R_ROLLBACK\` |
          | deploy-prod | \`$R_PROD\` |
          | prod-smoke | \`$R_PROD_SMOKE\` |
          | prod-login-probe | \`$R_PROBE\` |
          | prod-promote | \`$R_PROMOTE\` |

          **Links**
          - Deploy run: $RUN_URL
          - Convex gate: $GATE_URL

          Fix forward in a new PR; close this issue when a subsequent green deploy lands.
          EOF

          gh issue create \
            --repo neonbinder/neonbinder_browser \
            --title "Deploy failed at ${STAGE}: ${{ github.sha }}" \
            --body-file body.md
