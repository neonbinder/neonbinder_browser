name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (only needed for workflow_dispatch)"
        required: false
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    # Skip comment-triggered runs unless the comment mentions @claude and the issue is a PR
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          # Required for the action to call the Anthropic API. The OIDC
          # → GitHub App token exchange handles GH-side comment posting,
          # but the LLM call itself needs an Anthropic credential.
          # Without this the action exits with:
          #   "Either ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN is
          #    required when using direct Anthropic API."
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Review this pull request for code quality, correctness, security vulnerabilities (OWASP Top 10), and adherence to project conventions in CLAUDE.md. Focus on: (1) credential/secret handling — this service talks to Secret Manager, (2) Puppeteer/Chrome safety, (3) Convex integration via NEONBINDER_BROWSER_URL, (4) error handling and auth middleware. Post findings as inline review comments on the PR. Be specific about file:line."
          # `--max-turns 5` was set when this workflow was created in April
          # and PRs were tiny CI tweaks. As feature PRs landed, that budget
          # ran out mid-review (a "turn" = one tool call, so reading a few
          # files and posting comments easily exceeds 5). Bump to 20 — Claude
          # exits early when there's nothing left to do, so small PRs are
          # unaffected; large PRs now get a complete review instead of an
          # `error_max_turns` failure.
          claude_args: "--max-turns 20"
