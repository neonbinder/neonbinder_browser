name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (only needed for workflow_dispatch)"
        required: false
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    # Skip comment-triggered runs unless the comment mentions @claude and the issue is a PR
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Review this pull request for security, correctness, and
            adherence to CLAUDE.md conventions. Focus on:
              1. Credential/secret handling (Secret Manager, never logged in plaintext)
              2. Puppeteer/Chrome safety (cleanup, no resource leaks)
              3. Auth middleware + Convex integration via NEONBINDER_BROWSER_URL

            How to gather context (use these tools, in this order):
              - `gh pr view <PR> --json title,body,files` for metadata
              - `gh pr diff <PR>` for the diff
              - `Read` for any source file you need to inspect for context
              - `Grep` / `Glob` for cross-file searches when needed

            How to deliver findings:
              - For specific code issues, post inline comments via
                `mcp__github_inline_comment__create_inline_comment`
                (with `confirmed: true`).
              - For high-level / cross-cutting feedback, use
                `gh pr comment <PR> --body "..."`.
              - Organize feedback by severity: Blocker / Major / Minor.
              - If the PR is clean, post a single short approval comment.
              - Do NOT submit review text as plain output — only via
                GitHub comments.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Read,Grep,Glob"
