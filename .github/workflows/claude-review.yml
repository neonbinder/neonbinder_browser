name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (only needed for workflow_dispatch)"
        required: false
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    # Skip comment-triggered runs unless the comment mentions @claude and the issue is a PR
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          # Required for the action to call the Anthropic API. The OIDC
          # → GitHub App token exchange handles GH-side comment posting,
          # but the LLM call itself needs an Anthropic credential.
          # Without this the action exits with:
          #   "Either ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN is
          #    required when using direct Anthropic API."
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Summary-comment mode: post a SINGLE consolidated review
          # comment instead of N inline comments. Each inline comment =
          # 1 tool call, so a thorough review of a multi-file PR easily
          # consumed 20+ turns just on comment-posting. One summary
          # comment drops that overhead to 1 turn for the same findings.
          prompt: |
            Review this pull request for security, correctness, and
            adherence to CLAUDE.md conventions. Focus on:
              1. Credential/secret handling (Secret Manager, never logged in plaintext)
              2. Puppeteer/Chrome safety (cleanup, no resource leaks)
              3. Auth middleware + Convex integration via NEONBINDER_BROWSER_URL

            Read the PR diff and any source files needed for context, then
            post EXACTLY ONE consolidated review comment on the PR with
            your findings organized by severity (Blocker / Major / Minor).
            For each finding include the relevant file:line. Do not post
            inline comments — one summary comment is sufficient.
          # 30 turns gives ample headroom: ~5 turns for diff/file reads,
          # ~3 for the summary comment, leaving 20+ for any deeper
          # cross-file investigation. Claude exits early when finished.
          claude_args: "--max-turns 30"
